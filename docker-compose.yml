version: '3'

volumes:
  db_data: {}
  wordpress_data: {}

services:
  # MariaDB Database Service
  db:
    image: mariadb:10.6
    container_name: woocommerce_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    restart: unless-stopped

  # WordPress / WooCommerce Backend
  wordpress:
    image: wordpress:latest
    container_name: woocommerce_app
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - web         # For Traefik routing
      - internal    # DB connection
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Corrected Host rule: Use backticks (`) for string literals, not $ followed by curly braces for direct string.
      # If you're using an environment variable like YOUR_DOMAIN, it should be `${YOUR_DOMAIN}`.
      # Since you specified 'lifeisnatural.eu' directly, use it as a string.
      - "traefik.http.routers.wordpress.rule=Host(`lifeisnatural.eu`) && (PathPrefix(`/wp-json`) || PathPrefix(`/wp-admin`) || PathPrefix(`/wp-content`) || PathPrefix(`/wp-includes`))"
      - "traefik.http.routers.wordpress.entrypoints=websecure"
      - "traefik.http.routers.wordpress.tls.certresolver=myresolver"
      - "traefik.http.routers.wordpress.priority=200"
      - "traefik.http.services.wordpress.loadbalancer.server.port=80"
      - "traefik.docker.network=web"

  # React Frontend (Dockerize later)
  frontend:
    build:
      context: ./frontend
      # It's good practice to explicitly define the Dockerfile name if it's not 'Dockerfile'
      # dockerfile: Dockerfile
    container_name: react_frontend
    environment:
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - WOO_API_URL=${WOO_API_URL}
    depends_on:
      - wordpress
    networks:
      - web
      - internal
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Corrected Host rule: Use backticks (`) for string literals.
      # If you're using an environment variable like YOUR_DOMAIN, it should be `${YOUR_DOMAIN}`.
      # Since you specified 'lifeisnatural.eu' directly, use it as a string.
      - "traefik.http.routers.react.rule=Host(`lifeisnatural.eu`)"
      - "traefik.http.routers.react.entrypoints=websecure"
      - "traefik.http.routers.react.tls.certresolver=myresolver"
      # Changed from 3000 to 80 as requested, assuming Nginx or similar serving built React app
      - "traefik.http.services.react.loadbalancer.server.port=80"
      - "traefik.docker.network=web"

networks:
  web:
    external: true
  internal:
    internal: true
