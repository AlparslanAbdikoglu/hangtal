
version: '3'

volumes:
  db_data: {}
  wordpress_data: {}

services:
  # MariaDB Database Service
  db:
    image: mariadb:10.6
    container_name: woocommerce_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    restart: unless-stopped

  # WordPress / WooCommerce Backend
  wordpress:
    image: wordpress:latest
    container_name: woocommerce_app
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - web         # For Traefik routing
      - internal    # DB connection
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wordpress.rule=Host(`${YOUR_DOMAIN}`) && (PathPrefix(`/wp-json`) || PathPrefix(`/wp-admin`) || PathPrefix(`/wp-content`) || PathPrefix(`/wp-includes`))"
      - "traefik.http.routers.wordpress.entrypoints=websecure"
      - "traefik.http.routers.wordpress.tls.certresolver=myresolver"
      - "traefik.http.routers.wordpress.priority=200"
      - "traefik.http.services.wordpress.loadbalancer.server.port=80"
      - "traefik.docker.network=web"

  # React Frontend (Dockerize later)
  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_CLERK_PUBLISHABLE_KEY=${REACT_APP_CLERK_PUBLISHABLE_KEY}
        - REACT_APP_WOO_API_URL=${REACT_APP_WOO_API_URL}
    container_name: react_frontend
    depends_on:
      - wordpress
    networks:
      - web
      - internal
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.react.rule=Host(`${YOUR_DOMAIN}`)" # Adjust for subdomain or main domain
      - "traefik.http.routers.react.entrypoints=websecure"
      - "traefik.http.routers.react.tls.certresolver=myresolver"
      - "traefik.http.services.react.loadbalancer.server.port=80"
      - "traefik.docker.network=web"

networks:
  web:
    external: true
  internal:
    internal: true
